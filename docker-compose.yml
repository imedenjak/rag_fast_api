services:
  qdrant:
    image: qdrant/qdrant
    container_name: qdrant
    ports:
      - "6333:6333"    # REST API + dashboard
    volumes:
      - ./qdrant_db:/qdrant/storage

  api:
    build: .
    container_name: rag-app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      QDRANT_URL: http://qdrant:6333
      # OLLAMA_HOST: http://host.docker.internal:11434  # for Ollama
    volumes:
      - ./qdrant_db:/qdrant_db    # ← mount local qdrant folder
    restart: on-failure
